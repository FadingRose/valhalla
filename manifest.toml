# valhalla manifest
# This file drives `valhalla apply`, `valhalla diff`, and `valhalla secret inject`.
# See README.md for the full reference.

# ─── Links ──────────────────────────────────────────────────────────────────
# Each [[links]] entry creates one symlink: source (relative to repo) -> target.
# `target` supports ~ expansion.

[[links]]
source = "nvim"
target = "~/.config/nvim"

[[links]]
source = "kitty"
target = "~/.config/kitty"

[[links]]
source = "fish"
target = "~/.config/fish"

[[links]]
source = "opencode/themes/alter-avenger.json"
target = "~/.config/opencode/themes/alter-avenger.json"

[[links]]
source = "opencode/tui.json"
target = "~/.config/opencode/tui.json"

[[links]]
source = "vim/vimrc"
target = "~/.vimrc"

[[links]]
source = "vim/colors"
target = "~/.vim/colors"

# ─── Profiles ───────────────────────────────────────────────────────────────
# Optional device-specific overrides. Selected via --profile or auto-matched
# by hostname. Uncomment and adapt as needed.
#
# [[profiles]]
# name = "mac-mini"
# match_host = "kobayakawayuus-mac-mini"
# extra_links = [
#   { source = "pi", target = "~/.pi" },
# ]

# ─── Secrets ────────────────────────────────────────────────────────────────
# On `valhalla secret inject`, each entry here is decrypted and written into
# the file at `output` (as `set -gx VAR value` for fish).
#
# Var names preserve the original shell variable names so existing scripts
# that read $OPENROUTER_API_KEY etc. keep working without changes.

[secrets]
# Note: this path must NOT live inside a valhalla-managed symlink dir.
# ~/.local/share/valhalla/ is outside the repo, so the generated plaintext
# file never enters git.
output = "~/.local/share/valhalla/secrets.fish"

# ── LLM ────────────────────────────────────────────────────────────────────
[[secrets.inject]]
var = "OPENROUTER_API_KEY"
path = "llm/openrouter"

[[secrets.inject]]
var = "LLM_API_KEY"
path = "llm/llm-general"

[[secrets.inject]]
var = "HOUND_API_KEY"
